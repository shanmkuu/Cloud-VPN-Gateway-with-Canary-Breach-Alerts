# =============================================================================
# WireGuard Server Configuration – wg0.conf
# =============================================================================
# SECURITY NOTE: This file contains cryptographic private keys.
#   • Permissions MUST be 0600 (chmod 600 /etc/wireguard/wg0.conf)
#   • Owner MUST be root:root
#   • Never commit this file with real keys to version control
#   • Use environment variables or a secrets manager in production
# =============================================================================
# Generated by: setup.sh — replace placeholders before use
# =============================================================================

[Interface]
# Server private key — generate with: wg genkey | tee /etc/wireguard/server.key
PrivateKey = <SERVER_PRIVATE_KEY>

# WireGuard listen port (must match UFW rule in harden.sh)
ListenPort = 51820

# VPN subnet address for this gateway
Address = 10.10.0.1/24

# DNS resolver pushed to clients (use Pi-hole or Cloudflare DoH)
# DNS = 10.10.0.53, 1.1.1.1

# ── Routing: NAT all VPN traffic through the default interface ────────────────
# Detect primary interface dynamically in setup.sh and substitute ETH_IFACE
PostUp   = iptables -t nat -A POSTROUTING -s 10.10.0.0/24 -o %i -j MASQUERADE; \
           iptables -A FORWARD -i wg0 -o %i -j ACCEPT; \
           iptables -A FORWARD -i %i -o wg0 -m state --state RELATED,ESTABLISHED -j ACCEPT; \
           ip6tables -t nat -A POSTROUTING -s fd00::/8 -o %i -j MASQUERADE

PostDown = iptables -t nat -D POSTROUTING -s 10.10.0.0/24 -o %i -j MASQUERADE; \
           iptables -D FORWARD -i wg0 -o %i -j ACCEPT; \
           iptables -D FORWARD -i %i -o wg0 -m state --state RELATED,ESTABLISHED -j ACCEPT; \
           ip6tables -t nat -D POSTROUTING -s fd00::/8 -o %i -j MASQUERADE

# ── Security: Save config on peer changes ─────────────────────────────────────
SaveConfig = false

# =============================================================================
# Peer Entries — one block per client
# =============================================================================
# Generate client keys:
#   CLIENT_PRIV=$(wg genkey)
#   CLIENT_PUB=$(echo "$CLIENT_PRIV" | wg pubkey)
#   CLIENT_PSK=$(wg genpsk)    # Pre-shared key adds a layer of PQC resistance
# =============================================================================

[Peer]
# Peer name: <CLIENT_HOSTNAME>
# Public key — generate with: wg pubkey < client.key
PublicKey = <CLIENT_PUBLIC_KEY>

# Pre-shared key for post-quantum resistance (optional but recommended)
# PresharedKey = <PRESHARED_KEY>

# IP(s) assigned to this client within the VPN
AllowedIPs = 10.10.0.2/32

# Optional: pin to a specific client endpoint (static IP clients)
# Endpoint = <CLIENT_EXTERNAL_IP>:51820

# Keepalive: helps maintain the tunnel through NAT (25–30s recommended)
PersistentKeepalive = 25

# =============================================================================
# Client Configuration Template (distribute to each peer)
# Save as: /etc/wireguard/clients/<name>.conf (chmod 600)
# =============================================================================
# [Interface]
# PrivateKey = <CLIENT_PRIVATE_KEY>
# Address    = 10.10.0.2/24
# DNS        = 1.1.1.1
#
# [Peer]
# PublicKey  = <SERVER_PUBLIC_KEY>
# Endpoint   = <SERVER_PUBLIC_IP>:51820
# AllowedIPs = 0.0.0.0/0, ::/0   # Route all traffic through VPN
# PersistentKeepalive = 25
# =============================================================================
